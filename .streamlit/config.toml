[theme]
base="dark" # Can be "light" or "dark"
primaryColor="#026f8a" # Color for sliders, buttons, accents
backgroundColor="#FFFFFF" # Main body background color
secondaryBackgroundColor="#F0F2F6" # Sidebar and widget background color
textColor="#000000" # Font color for text
chartCategoricalColors = ["#d98e43", "#76c484", "#3357FF", "#d70093"]

[client]
toolbarMode="minimal"